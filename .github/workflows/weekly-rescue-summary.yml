name: Weekly Rescue Summary

on:
  schedule:
    # Runs every Monday at 8 AM Pacific (16:00 UTC)
    - cron: '0 16 * * 1'
  workflow_dispatch: {}

jobs:
  run-summary:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run weekly rescue summary script
        run: pnpm weekly
        env:
          SHELTERLUV_API_KEY: ${{ secrets.SHELTERLUV_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEEKLY_CHANNEL_ID: ${{ secrets.SLACK_WEEKLY_CHANNEL_ID }}
